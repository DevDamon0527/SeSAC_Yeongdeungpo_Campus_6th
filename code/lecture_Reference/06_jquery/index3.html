<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Event</title>
    <!-- jQuery CDN -->
    <script 
       src="https://code.jquery.com/jquery-3.7.1.min.js" 
       integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" 
       crossorigin="anonymous">
   </script>
   
    <script defer src="./index3.js"></script>
    <!--
        (참고) 
        defer 속성을 사용하면 스크립트가 DOM이 완전히 로드된 후에 실행되므로 jQuery와 같은 라이브러리가 제대로 동작할 수 있도록 보장합니다. 반면 defer 속성이 없으면 스크립트가 DOM이 완전히 로드되기 전에 실행될 수 있어 에러가 발생할 수 있습니다. -->
    <style>
        body {
          padding-bottom: 1000px;
        }
  
        .hover {
          font-size: 20px;
          background-color: aqua;
          transition: all 0.2s;
        }
      </style>
</head>
<body>
    <h1>jQuery Event</h1>

    <p class="p-msg">안녕하세요</p>

    <ul class="numbers">
        <li class="num">one</li>
        <li class="num">two</li>
        <li class="num">three</li>
        <li class="num">four</li>
    </ul>

    <div class="div-hover">hover 변화</div>
    <hr />

    <h2>키보드 이벤트</h2>
    <input class="input-key" type="text" />
    <hr />

    <h2>폼 이벤트</h2>
    <h3>Todo 리스트</h3>
    <form id="todo-form">
        <input type="text" name="todo" />
        <button>Add</button>
    </form>
    <ul class="todos"></ul>
    <hr />

    <h2>this</h2>
    <h3>버튼 클릭시 클릭된 버튼의 색상만 변경하고 싶은 경우!!</h3>
    <button class="btn btn1">btn1</button>
    <button class="btn btn2">btn2</button>
    <button class="btn btn3">btn3</button>
    <button class="btn btn4">btn4</button>
    <button class="btn btn5">btn5</button>

    <span class="span span1">span1</span>
    <span class="span span2">span2</span>
    <span class="span span3">span3</span>
    <span class="span span4">span4</span>
    <span class="span span5">span5</span>

    <hr />
</body>
</html>
